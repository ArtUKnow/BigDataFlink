services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - JAVA_TOOL_OPTIONS=-Xint

  jobmanager:
    image: flink:1.17
    user: "root"
    ports:
      - "8081:8081"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/1.17.0/flink-sql-connector-kafka-1.17.0.jar &&
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/apache/flink/flink-connector-jdbc/3.1.0-1.17/flink-connector-jdbc-3.1.0-1.17.jar &&
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/postgresql/postgresql/42.6.0/postgresql-42.6.0.jar &&
      mkdir -p /var/lib/apt/lists/partial && apt-get -o APT::Sandbox::User=root update && apt-get install -y python3 python3-pip && ln -sf /usr/bin/python3 /usr/bin/python && pip3 install apache-flink==1.17.0 &&
      exec /docker-entrypoint.sh jobmanager
      "
    environment:
      - JAVA_TOOL_OPTIONS=-Xint
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./flink_job.py:/opt/flink/flink_job.py

  taskmanager:
    image: flink:1.17
    user: "root"
    depends_on:
      - jobmanager
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/apache/flink/flink-sql-connector-kafka/1.17.0/flink-sql-connector-kafka-1.17.0.jar &&
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/apache/flink/flink-connector-jdbc/3.1.0-1.17/flink-connector-jdbc-3.1.0-1.17.jar &&
      wget -q -P /opt/flink/lib/ https://repo1.maven.org/maven2/org/postgresql/postgresql/42.6.0/postgresql-42.6.0.jar &&
      mkdir -p /var/lib/apt/lists/partial && apt-get -o APT::Sandbox::User=root update && apt-get install -y python3 python3-pip && ln -sf /usr/bin/python3 /usr/bin/python && pip3 install apache-flink==1.17.0 &&
      exec /docker-entrypoint.sh taskmanager
      "
    environment:
      - JAVA_TOOL_OPTIONS=-Xint
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  producer:
    image: python:3.10-slim
    depends_on:
      - kafka
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    command: >
      bash -c "
      pip install --no-cache-dir kafka-python==2.0.2 &&
      echo 'Waiting for Kafka to start...' &&
      sleep 15 &&
      python kafka_producer.py
      "
